name: Deploy Zola site to Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. Instalar la versión exacta de Zola que usas en tu máquina
      - name: Install Zola
        run: |
          HEX_VERSION="v0.22.1"
          curl -sSL "https://github.com/getzola/zola/releases/download/${HEX_VERSION}/zola-${HEX_VERSION}-x86_64-unknown-linux-gnu.tar.gz" | tar -xz
          sudo mv zola /usr/local/bin/

      # 2. Compilar el sitio usando Zola de forma nativa
      - name: Build Site
        run: zola build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

name: Deploy Zola site to Pages

on:
  push:
    branches:
      - main  # Se ejecutará cada vez que subas cambios a la rama main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install and Build Zola
        uses: shalzz/zola-deploy-action@v0.19.2
        env:
          # Esto compila tu sitio usando la URL correcta de tu GitHub Pages
          BUILD_DIR: .
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Si tienes un dominio personalizado, puedes quitar esta línea o cambiarla
          BUILD_ONLY: true 

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
